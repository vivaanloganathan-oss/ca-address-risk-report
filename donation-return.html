<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Returning to Home Risk Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1b2d;--ink:#16202f;--muted:#66748a;--accent:#2f6df6;--line:#e6eaf1;--bg:#f3f6fb}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0f1b2d,#20395f);font-family:Inter,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--ink);padding:24px}
.card{width:min(520px,100%);background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.22);padding:30px;text-align:center}
.mark{width:64px;height:64px;margin:0 auto 16px;border-radius:18px;background:#e9f8ef;color:#1f9d57;display:grid;place-items:center;font-size:34px;font-weight:900}
h1{font-size:26px;line-height:1.15;margin:0 0 10px}p{margin:0;color:var(--muted);line-height:1.55;font-size:15px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:22px}.btn{border:1px solid #d4dbe6;border-radius:12px;padding:13px 15px;font:inherit;font-weight:800;cursor:pointer;text-decoration:none;color:var(--navy);background:#fff}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}@media(max-width:520px){.actions{grid-template-columns:1fr}}
</style>
<script>setTimeout(function(){ window.location.replace("./?donation=success"); }, 900);</script>
</head>
<body>
  <main class="card">
    <div class="mark">✓</div>
    <h1>Thank you for supporting Home Risk Radar</h1>
    <p>Your donation helps improve the tool. Returning you to the report page so you can download your PDF.</p>
    <div class="actions">
      <a class="btn primary" href="./?donation=success">Return to download</a>
      <a class="btn" href="./">Home</a>
    </div>
  </main>
</body>
</html>
